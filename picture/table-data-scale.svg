<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="310" viewBox="0 0 1200 310" role="img" aria-label="数据规模表">
  <style>
    .title { font: 700 30px 'Microsoft YaHei', 'PingFang SC', 'Noto Sans CJK SC', Arial, sans-serif; fill: #111827; }
    .th { font: 700 22px 'Microsoft YaHei', 'PingFang SC', 'Noto Sans CJK SC', Arial, sans-serif; fill: #ffffff; }
    .td { font: 500 20px 'Microsoft YaHei', 'PingFang SC', 'Noto Sans CJK SC', Arial, sans-serif; fill: #1f2937; }
    .num { font: 700 20px 'Microsoft YaHei', 'PingFang SC', 'Noto Sans CJK SC', Arial, sans-serif; fill: #0f172a; }
    .border { stroke: #cbd5e1; stroke-width: 1; fill: #ffffff; }
    .header { fill: #0A66C2; }
  </style>
  <text x="0" y="34" class="title">数据规模</text>
  <rect x="0" y="64" width="240" height="58" class="header"/>
  <rect x="240" y="64" width="760" height="58" class="header"/>
  <rect x="1000" y="64" width="200" height="58" class="header"/>
  <text x="120" y="101" text-anchor="middle" class="th">数据模块</text>
  <text x="620" y="101" text-anchor="middle" class="th">作用</text>
  <text x="1100" y="101" text-anchor="middle" class="th">规模</text>
  <rect x="0" y="122" width="240" height="56" class="border"/>
  <rect x="240" y="122" width="760" height="56" class="border"/>
  <rect x="1000" y="122" width="200" height="56" class="border"/>
  <text x="18" y="157" class="td">Benchmark</text>
  <text x="258" y="157" class="td">评估真实未成年人信号与成人近似样本之间的区分能力</text>
  <text x="1100" y="157" text-anchor="middle" class="num">8,328 条</text>
  <rect x="0" y="178" width="240" height="56" class="border"/>
  <rect x="240" y="178" width="760" height="56" class="border"/>
  <rect x="1000" y="178" width="200" height="56" class="border"/>
  <text x="18" y="213" class="td">RAG 检索案例库</text>
  <text x="258" y="213" class="td">提供运行时相似案例辅助判断与离线优化参考</text>
  <text x="1100" y="213" text-anchor="middle" class="num">5,829 条</text>
  <rect x="0" y="234" width="240" height="56" class="border"/>
  <rect x="240" y="234" width="760" height="56" class="border"/>
  <rect x="1000" y="234" width="200" height="56" class="border"/>
  <text x="18" y="269" class="td">Trigger-Eval</text>
  <text x="258" y="269" class="td">优化“什么时候该启动深度识别”的触发边界问题</text>
  <text x="1100" y="269" text-anchor="middle" class="num">160 条</text>
</svg>
